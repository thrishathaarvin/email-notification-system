name: Backend CI

# Trigger on pushes or PRs to main/master
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ===========================
  # Backend Java Tests + SonarQube
  # ===========================
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & run backend tests
        run: mvn clean test -Dmaven.test.failure.ignore=true
        working-directory: backend

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      # ===========================
      # SonarQube Analysis
      # ===========================
      - name: Build and analyze with SonarCloud
        continue-on-error: true
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
         mvn clean verify sonar:sonar \
          -Dsonar.projectKey=thrishathaarvin_cicd \
          -Dsonar.organization=thrishathaarvin \
          -Dsonar.host.url=https://sonarcloud.io

