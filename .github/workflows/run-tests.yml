name: Backend CI

# Trigger workflow on pushes or PRs to main/master
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1. Checkout code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------------
      # 2. Set up JDK
      # -------------------------------
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      # -------------------------------
      # 3. Cache Maven dependencies
      # -------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -------------------------------
      # 4. Cache Sonar packages
      # -------------------------------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # -------------------------------
      # 5. Build & run tests
      # -------------------------------
      - name: Build & run backend tests
        run: mvn clean test -Dmaven.test.failure.ignore=true
        working-directory: backend

      # -------------------------------
      # 6. Upload test reports
      # -------------------------------
      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      # -------------------------------
      # 7. SonarCloud Analysis
      # -------------------------------
      - name: Build and analyze with SonarCloud
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required by SonarCloud GitHub integration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     # your SonarCloud token
        run:
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=thrishathaarvin_email-notification-system \
            -Dsonar.organization=thrishathaarvin \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.binaries=target/classes
        working-directory: backend
